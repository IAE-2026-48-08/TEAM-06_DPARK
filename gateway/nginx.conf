# ─────────────────────────────────────────────────────────────
# TEAM-06 DPark Bandung — API Gateway (Nginx)
# Semua request dari luar masuk ke port 80
# lalu diteruskan ke service masing-masing
# ─────────────────────────────────────────────────────────────

upstream service_lokasi {
    server service-lokasi:80;
}

upstream service_transaksi {
    server service-transaksi:80;
}

upstream service_membership {
    server service-membership:80;
}

server {
    listen 80;
    server_name localhost;

    # ── Health check gateway ──────────────────────────────────
    location = /health {
        return 200 '{"status":"gateway ok","team":"TEAM-06 DPark Bandung"}';
        add_header Content-Type application/json;
    }

    # ── SERVICE A: Lahan & Lokasi ─────────────────────────────
    # GET  /api/v1/locations
    # GET  /api/v1/locations/{id}
    # POST /api/v1/locations
    # POST /api/v1/locations/{id}/check-in
    location /api/v1/locations {
        proxy_pass http://service_lokasi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SERVICE B: Transaksi ──────────────────────────────────
    # POST /api/v1/transactions
    # GET  /api/v1/transactions
    # GET  /api/v1/transactions/{id}
    location /api/v1/transactions {
        proxy_pass http://service_transaksi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SERVICE C: Membership ─────────────────────────────────
    # GET  /api/v1/members
    # GET  /api/v1/members/{id}
    # POST /api/v1/members/verification
    # POST /api/v1/sso/token
    # POST /api/v1/sso/login
    # POST /api/v1/sso/verify
    location /api/v1/members {
        proxy_pass http://service_membership;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/sso {
        proxy_pass http://service_membership;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Default: 404 ─────────────────────────────────────────
    location / {
        return 404 '{"error":"Route tidak ditemukan di API Gateway"}';
        add_header Content-Type application/json;
    }
}
